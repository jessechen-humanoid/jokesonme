<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>收支紀錄 — 看我笑話工作室</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav"></nav>

  <div class="container">
    <h1 class="page-title">收支紀錄</h1>

    <div class="show-selector" id="show-selector"></div>

    <!-- Add Transaction Form -->
    <div class="card" id="add-form" style="display:none;">
      <div class="card-title" id="form-title">新增收支</div>
      <div class="toggle-group" id="tx-type-toggle">
        <button class="toggle-btn active" data-type="expense">支出</button>
        <button class="toggle-btn" data-type="income">收入</button>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">分類</label>
          <div id="tx-category-container"></div>
        </div>
        <div class="form-group">
          <label class="form-label">金額（含稅）</label>
          <input type="number" class="form-control" id="tx-amount" min="0" placeholder="例：3500">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">備註（選填）</label>
        <input type="text" class="form-control" id="tx-notes" placeholder="例：三創場地4月">
      </div>
      <div class="form-group" id="tx-member-group">
        <label class="form-label">墊款人 / 收款人（公帳支付可留空）</label>
        <div id="tx-member-container"></div>
      </div>
      <div class="form-group" id="tx-allocation-group" style="display:none;">
        <label class="form-label">收入分配</label>
        <div id="tx-allocation-container"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">日期</label>
          <input type="date" class="form-control" id="tx-date">
        </div>
        <div class="form-group">
          <label class="form-label">登記人</label>
          <div id="tx-recorder-container"></div>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="tx-submit">新增</button>
        <button class="btn btn-secondary" id="tx-cancel" style="display:none;">取消編輯</button>
      </div>
    </div>

    <!-- Transaction List -->
    <div id="transaction-list"></div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/transaction.js"></script>
</body>
</html>
